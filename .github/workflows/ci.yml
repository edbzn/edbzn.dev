name: Build & Test

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Enable Corepack
        run: corepack enable
      - name: Use Node.js v20
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Browsers
        run: pnpm playwright install chromium --with-deps
      - run: pnpm build
        env:
          GATSBY_IDEAS_API: ${{ vars.GATSBY_IDEAS_API }}
          GATSBY_REACTIONS_API: ${{ vars.GATSBY_REACTIONS_API }}
          GATSBY_TURNSTILE_SITE_KEY: ${{ vars.GATSBY_TURNSTILE_SITE_KEY }}
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: public
          path: public/
          retention-days: 1

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Enable Corepack
        run: corepack enable
      - name: Use Node.js v20
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Cache Cypress binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            cypress-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - name: Install Cypress binary
        run: pnpm exec cypress install
      - name: Install Playwright Browsers
        run: pnpm playwright install chromium --with-deps
      - run: pnpm test:e2e:ci

  deploy:
    permissions:
      contents: read
      deployments: write
    runs-on: ubuntu-latest
    needs: [build, e2e]
    steps:
      - uses: actions/checkout@v6
      - name: Enable Corepack
        run: corepack enable
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: public
          path: public/
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy public --project-name=blog

  deploy-worker:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [build, e2e]
    # Only deploy the Worker on pushes to main.
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker/blog-ideas
          wranglerVersion: '4'
          command: deploy

  deploy-reactions-worker:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [build, e2e]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - name: Deploy Reactions Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker/reactions
          wranglerVersion: '4'
          command: deploy
